site_name: 風濕免疫筆記
site_url: https://tsaiming1014.github.io/rheum-note/
docs_dir: .

exclude_docs: |
  CLAUDE.md
  *.py
  *.txt
  *.bat
  *.ps1
  *.pdf
  *.docx
  auto-push.ps1
  watchpath.txt
  extract_docx.py
  raw_all.txt
  Non-autopush/**

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切換深色模式
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切換淺色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang:
        - zh
        - en

nav:
  - 首頁: index.md
  - 風專考試:
    - 重點整理:
      - AAV - ANCA 致病機轉: board exam/重點整理/AAV_ANCA致病機轉.md
